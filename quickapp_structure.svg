<style>
* { font-family: 'Courier New', Courier, monospace; }
.t  { font-size: 13px; fill: #1f2937; }
.ts { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #6b7280; }
.th { font-size: 13px; fill: #1f2937; font-weight: 600; }
.pkg { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; font-weight: 600; fill: #374151; }
.line { stroke: #d1d5db; stroke-width: 0.75; fill: none; }

.clr-coral  { fill: #f97316; }
.clr-blue   { fill: #3b82f6; }
